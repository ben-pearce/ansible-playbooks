name: 🔄 Private Repository Sync

on:
  schedule:
  - cron: "30 0 * * 1" # Every Monday at 00:30 UTC
  workflow_dispatch:

jobs:
  repo-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: 🤫 Creating GitHub App Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ${{ vars.PRIVATE_REPO }}
            ${{ github.event.repository.name }}

      - name: 🛠️ Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        
      - name: 🛠️ Checkout private repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ github.repository_owner }}/${{ vars.PRIVATE_REPO }}
          token: ${{ steps.app-token.outputs.token }}
          path: private-repo

      - name: 🔄 Sync Private Repository
        run: |
          cp -r ${GITHUB_WORKSPACE}/private-repo/* ./

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

          git diff | grep -q '\$ANSIBLE_VAULT' && { echo "Aborting: \$ANSIBLE_VAULT found."; exit 1; }
          git add . ':!private-repo'

          if git diff --cached --quiet; then
            echo "Aborting: no changes to commit."
            exit 0
          fi

          git commit -m "chore: 🔄 sync changes from private"
          
          branch="private-sync-$(git rev-parse --short HEAD)"
          git checkout -b $branch
          git push --set-upstream origin $branch

          gh pr create \
            --title "Sync private repository changes" \
            --body "Request to merge changes from private repository with secrets redacted."
        env:
          GH_TOKEN: ${{ github.token }}