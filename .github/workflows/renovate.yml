name: 🤖 Automated Dependency Updates

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 6' # Every Saturday at midnight UTC

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: 🤖 Run Renovate
        uses: renovatebot/github-action@f7fad228a053c69a98e24f8e4f6cf40db8f61e08 # v44.2.1
        with:
          configurationFile: .github/renovate-config.json
          token: ${{ secrets.REPOSITORY_TOKEN }}
        env:
          RENOVATE_ABANDONMENT_THRESHOLD: 90 days
          RENOVATE_MINIMUM_RELEASE_AGE: 3 days
          RENOVATE_PIN_DIGESTS: true
