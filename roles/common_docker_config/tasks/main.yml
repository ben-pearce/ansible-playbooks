- name: "🔍 Check for Docker user config"
  tags: [docker, config]
  ansible.builtin.stat:
    path: secrets/docker_config/{{ inventory_hostname }}/config.json
  register: common_docker_config_json
  delegate_to: localhost
  become: false

- name: "🛠️ Apply Docker user config if available"
  tags: [docker, config]
  when: common_docker_config_json.stat.exists
  block:
    - name: "📂 Ensure Docker config directory exists"
      ansible.builtin.file:
        path: /root/.docker/
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: "📄 Deploy Docker config file"
      ansible.builtin.copy:
        src: secrets/docker_config/{{ inventory_hostname }}/config.json
        dest: /root/.docker/config.json
        owner: root
        group: root
        mode: "0600"
        force: false
