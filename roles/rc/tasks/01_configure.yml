---
- name: Cron job - update mailcow
  ansible.builtin.cron:
    name: 'update mailcow'
    minute: '3'
    hour: '3'
    weekday: '0'
    job: 'cd /opt/mailcow-dockerized/ && ./update.sh --force'

- name: Cron job - update relay
  ansible.builtin.cron:
    name: 'update relay'
    minute: '30'
    hour: '3'
    weekday: '0'
    job: 'cd /opt/relay && /usr/bin/docker compose down && /usr/bin/docker compose pull && /usr/bin/docker compose up -d'

- name: Cron job - backup mailcow
  ansible.builtin.cron:
    name: 'backup mailcow'
    minute: '0'
    hour: '0'
    job: 'MAILCOW_BACKUP_LOCATION=/opt/mailcow-dockerized/backups/ /opt/mailcow-dockerized/helper-scripts/backup_and_restore.sh backup all --delete-days 1'

- name: Add 'jessie' alias 
  ansible.builtin.lineinfile:
    dest: /etc/cloud/templates/hosts.debian.tmpl
    line: "{{ hostvars['jessie'].ansible_host }} jessie"
    state: present

- name: Copy docker daemon configuration
  ansible.builtin.copy:
    src: files/docker/daemon.json
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: '0600'

- name: Restart docker service
  ansible.builtin.service:
    name: docker
    state: restarted

- name: Configure journald
  community.general.ini_file:
    path: /etc/systemd/journald.conf
    section: Journal
    option: '{{ item.option }}'
    value: '{{ item.value }}'
  with_items:
    - option: Storage
      value: volatile
    - option: Compress
      value: 'yes'
    - option: SystemMaxUse
      value: 50M
    - option: SystemMaxFileSize
      value: 5M
    - option: ForwardToSyslog
      value: 'no'

- name: Restart systemd-journald service
  ansible.builtin.service:
    name: systemd-journald
    state: restarted
